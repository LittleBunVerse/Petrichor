name: 🐞 Bug 报告 / Bug Report
description: 报告一个异常行为或缺陷
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢报告 Bug！请先在 [Issues](../issues?q=is%3Aissue) 中搜索是否已有相同问题。
        填写时请**隐去**任何敏感信息：数据库密码、API Key、Cookie、Token、用户邮箱等。

  - type: checkboxes
    id: preflight
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索过现有 Issue，没有重复
          required: true
        - label: 我已确认这是 Petrichor 自身的 Bug，而非配置 / 部署问题
          required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简洁说明你遇到的问题
      placeholder: 点击 XX 按钮后，页面闪退…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 越精确越容易定位问题
      placeholder: |
        1. 登录管理员账号
        2. 进入「知识库」页
        3. 点击「新建文章」
        4. 看到 …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      placeholder: 文章编辑器应正常打开
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 含完整报错信息 / 浏览器控制台日志 / 截图（注意脱敏）
    validations:
      required: true

  - type: dropdown
    id: env-platform
    attributes:
      label: 部署环境
      options:
        - Vercel
        - 本地开发 (pnpm dev)
        - 自托管 (其他)
    validations:
      required: true

  - type: input
    id: env-browser
    attributes:
      label: 浏览器 / 操作系统
      placeholder: Chrome 131 / macOS 15.1
    validations:
      required: true

  - type: input
    id: env-version
    attributes:
      label: Petrichor 版本 / 提交 SHA
      description: 例如 `main@c4d9c89` 或 release tag
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: Vercel Functions 日志 / 浏览器控制台 / Network 异常请求
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: 其他补充信息
      description: 数据库表大小、特殊环境变量、自定义改动等
